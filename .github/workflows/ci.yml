name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CI: true
      NODE_ENV: test
      # Keep CI isolated from real provider credentials.
      OPENAI_API_KEY: ""
      ANTHROPIC_API_KEY: ""
      OPENROUTER_API_KEY: ""
      KIMI_API_KEY: ""
      DEEPSEEK_API_KEY: ""
      GOOGLE_API_KEY: ""
      BYTEPLUS_ARK_API_KEY: ""
      FAL_API_KEY: ""
      ESTACODA_TELEGRAM_BOT_TOKEN: ""
      TELEGRAM_BOT_TOKEN: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check whitespace and patch hygiene
        run: git diff --check

      - name: Typecheck
        run: bun run typecheck

      - name: Run smoke tests
        run: bun run smoke

      - name: Run unit tests when configured
        shell: bash
        run: |
          if bun run 2>/dev/null | grep -qE '^\s*test\b'; then
            bun run test
          else
            echo "No package.json test script configured; skipping unit tests."
          fi
